<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>中国3D地图可视化与下钻</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0e1a; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }
    #map-container { width: 100%; height: 100%; position: relative; }
    canvas { display: block; }

    /* Glassmorphism Back Button */
    #back-btn {
      position: absolute;
      top: 24px;
      left: 24px;
      display: none;
      align-items: center;
      background: rgba(10, 18, 36, 0.7);
      border: 1px solid rgba(0, 170, 255, 0.35);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: #a9d9ff;
      font-size: 15px;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4), inset 0 0 10px rgba(0, 170, 255, 0.1);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      outline: none;
      letter-spacing: 0.5px;
    }

    #back-btn:hover {
      background: rgba(0, 170, 255, 0.15);
      border-color: rgba(0, 170, 255, 0.8);
      color: #ffffff;
      box-shadow: 0 4px 25px rgba(0, 170, 255, 0.35), inset 0 0 12px rgba(0, 170, 255, 0.2);
      transform: translateY(-2px);
    }

    #back-btn:active {
      transform: translateY(0);
      box-shadow: 0 2px 10px rgba(0, 170, 255, 0.2);
    }

    /* Cyber Tooltip */
    #tooltip {
      position: absolute;
      display: none;
      pointer-events: none;
      background: rgba(8, 12, 24, 0.88);
      border: 1px solid rgba(0, 170, 255, 0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      padding: 8px 14px;
      border-radius: 6px;
      color: #ffffff;
      font-size: 14px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.6), 0 0 15px rgba(0, 170, 255, 0.25);
      z-index: 999;
      transition: opacity 0.15s ease;
    }

    /* Glass Loading Overlay */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(5, 8, 18, 0.8);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }

    #loading-overlay.visible {
      display: flex;
      opacity: 1;
    }

    .loader-spinner {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top: 3px solid #00c3ff;
      border-bottom: 3px solid #00c3ff;
      animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      filter: drop-shadow(0 0 12px rgba(0, 195, 255, 0.5));
      margin-bottom: 20px;
      position: relative;
    }

    .loader-spinner::after {
      content: '';
      position: absolute;
      inset: 6px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-left: 2px solid #0055ff;
      border-right: 2px solid #0055ff;
      animation: spin-reverse 1.2s linear infinite;
    }

    #loading-text {
      color: #bce4ff;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-shadow: 0 0 10px rgba(0, 170, 255, 0.4);
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes spin-reverse {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
  </style>
  <script type="module" crossorigin src="./assets/index-DmzXgzuP.js"></script>
</head>
<body>
  <div id="map-container">
    <button id="back-btn">
      <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px; vertical-align: -2px;">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      返回中国地图
    </button>
  </div>
  
  <div id="tooltip"></div>

  <div id="loading-overlay">
    <div class="loader-spinner"></div>
    <div id="loading-text">正在加载 3D 城市数据...</div>
  </div>

</body>
</html>
